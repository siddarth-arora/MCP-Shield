# Existing roles block stays untouched
roles:
  analyst:
    allowed_tools: [query_db, list_tables, send_email, generate_report]
    denied_tools: [delete_record]
  admin:
    allowed_tools: ["*"]
  untrusted:
    allowed_tools: []

# NEW: define named upstream servers
servers:
  db-server:
    url: http://localhost:3001
    description: Internal database MCP server
  api-server:
    url: http://localhost:3002
    description: Internal API MCP server
  report-server:
    url: http://localhost:3003
    description: Report generation server
  default:
    url: http://localhost:3001
    description: Fallback for unmapped tools

# NEW: map tools to servers
routes:
  query_db:     db-server
  list_tables:  db-server
  delete_record: db-server
  send_email:   api-server
  webhook_call: api-server
  generate_report: report-server
  export_pdf:   report-server
  # anything not listed goes to 'default'